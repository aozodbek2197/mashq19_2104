<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Modal</title>
<style>
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
}
.modal-content {
    background: white;
    padding: 20px;
    margin: 100px auto;
    width: 300px;
}
</style>
</head>
<body>

<button onclick="openModal()">Ochish</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Salom!</h3>
        <button onclick="closeModal()">Yopish</button>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("modal").style.display = "block";
}
function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
